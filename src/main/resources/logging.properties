# Global logging level
.level=WARNING

# Handler definition
handlers=java.util.logging.ConsoleHandler

# ConsoleHandler configuration
java.util.logging.ConsoleHandler.level=INFO
java.util.logging.ConsoleHandler.formatter=java.util.logging.SimpleFormatter

# Clean Code Format: [yyyy-MM-dd HH:mm:ss] [LEVEL  ] Logger: Message
java.util.logging.SimpleFormatter.format=[%1$tF %1$tT] [%4$-7s] %3$s: %5$s%n

# Specific log levels for the example project
net.ucanaccess.example.level=FINE

# Keep third-party noise low unless debugging is required
net.ucanaccess.level=INFO
io.github.spannm.level=INFO
org.hsqldb.level=INFO
